# E2E stack: Vault dev + SSH CA + luna-proxy (LUNA_ENV=dev, test mTLS certs).
# Run: make e2e-up && LUNA_PROXY_URL=https://localhost:8443 go test -tags=e2e ./sdk/sign/... -v
services:
  vault:
    image: hashicorp/vault:1.17
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
    command: server -dev
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 3s

  vault-setup:
    image: hashicorp/vault:1.17
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
    volumes:
      - ./vault/ssh-ca-setup.sh:/scripts/ssh-ca-setup.sh:ro
    entrypoint: ["/bin/sh", "/scripts/ssh-ca-setup.sh"]
    restart: "no"

  luna-proxy:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.luna-proxy
    depends_on:
      vault-setup:
        condition: service_completed_successfully
    ports:
      - "8443:8443"
    environment:
      LUNA_ENV: dev
      LUNA_LISTEN_ADDR: ":8443"
      LUNA_VAULT_ADDR: http://vault:8200
      LUNA_VAULT_TOKEN: root
      VAULT_ADDR: http://vault:8200
      LUNA_MTLS_SERVER_CERT: /etc/luna/certs/server.crt
      LUNA_MTLS_SERVER_KEY: /etc/luna/certs/server.key
      LUNA_MTLS_CLIENT_CA: /etc/luna/certs/ca.crt
    volumes:
      - ../testdata/ca:/etc/luna/certs:ro
