# E2E stack: luna-proxy with encrypted signing key (manual unseal from tests or admin API).
# Run: make e2e-up && make e2e-test && make e2e-down
services:
  luna-proxy:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.luna-proxy
    ports:
      - "8443:8443"
    environment:
      LUNA_ENV: dev
      LUNA_LISTEN_ADDR: ":8443"
      LUNA_KEY_PATH: /etc/luna/ssh/encrypted_ca.key
      LUNA_SIGNER_MODE: local-ca
      LUNA_ADMIN_CLIENT_OU: luna-admin
      LUNA_MTLS_SERVER_CERT: /etc/luna/certs/server.crt
      LUNA_MTLS_SERVER_KEY: /etc/luna/certs/server.key
      LUNA_MTLS_CLIENT_CA: /etc/luna/certs/ca.crt
      LUNA_CONTROL_SOCKET: /run/luna/control.sock
    volumes:
      - ../testdata/ca:/etc/luna/certs:ro
      - ../testdata/ssh:/etc/luna/ssh:ro
