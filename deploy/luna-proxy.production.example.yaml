# Luna Z-Trust — production central server (luna-proxy)
#
# Setup:
#   cp deploy/luna-proxy.production.example.yaml /etc/luna/proxy.yml
#   chmod 600 /etc/luna/proxy.yml
#   Edit paths and Telegram values; do NOT put the key passphrase here.
#
# After start, load signing key via control socket:
#   luna-proxy --socket /run/luna/control.sock key load /etc/luna/ssh/encrypted_ca.key --passphrase-stdin
#
# systemd:
#   sudo luna-proxy install systemd --enable
#   Environment=LUNA_CONFIG=/etc/luna/proxy.yml
#   ExecStart=/usr/local/bin/luna-proxy serve
#
# Environment variables override values in this file.

# Never set env=dev in production
# env: production

listen_addr: ":8443"
control_socket: /run/luna/control.sock
control_socket_group: luna-admin

# Encrypted OpenSSH PEM; chmod 400; owner root or dedicated luna user
key_path: /etc/luna/ssh/encrypted_ca.key
signer_mode: local-ca
# signer_mode: local-key
# key_path: /etc/luna/ssh/encrypted_host.key

admin_client_ou: luna-admin
approval_timeout: 60s

# mTLS server + client CA (issue automation certs separately)
mtls_server_cert: /etc/luna/certs/server.crt
mtls_server_key: /etc/luna/certs/server.key
mtls_client_ca: /etc/luna/certs/ca.crt

# Telegram OOB approval (required when env is not dev)
telegram_bot_token: ""
telegram_webhook_secret: ""
telegram_chat_id: ""

# Mobile push (P5 — stub until implemented)
# fcm_credentials: ""
